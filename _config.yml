title: "Notas de um Analgésico"
description: "Um espaço para tirar as coisas de dentro."
baseurl: "/blog"
url: "https://filipes0usa.github.io"
lang: pt

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate-v2

# Pagination
pagination:
  enabled: true
  per_page: 5
  permalink: "/page/:num/"
  sort_reverse: true
  sort_field: "date"

# Allow future-dated posts to show
future: true

# Collections
permalink: /posts/:year/:month/:day/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
