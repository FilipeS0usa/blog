<!DOCTYPE html>
<html lang="{{ site.lang | default: 'pt' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="color-scheme" content="dark" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% seo %}
</head>
<body>
  <a href="#main-content" class="skip-link">Saltar para o conteúdo</a>
  <div class="site-wrapper">
    <header class="site-header">
      <nav>
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active" aria-current="page"{% endif %}>Início</a></li>
          <li><a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active" aria-current="page"{% endif %}>Publicações</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-content" tabindex="-1">
      {{ content }}
    </main>
  </div>

  <footer class="site-footer">
    <p>© {{ 'now' | date: '%Y' }} {{ site.title }}</p>
  </footer>
</body>
</html>
