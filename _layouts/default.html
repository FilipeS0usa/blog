<!DOCTYPE html>
<html lang="{{ site.lang | default: 'pt' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="color-scheme" content="dark" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% seo %}
  <!-- Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'pt',
          includedLanguages: 'en,es,fr,de',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        },
        'google_translate_element'
      );
    }
  </script>
</head>
<body>
  <div class="site-wrapper">
    <header class="site-header">
      <nav>
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Início</a></li>
          <li><a href="{{ '/posts/' | relative_url }}" {% if page.url == '/posts/' %}class="active"{% endif %}>Publicações</a></li>
        </ul>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>
  </div>

  <footer class="site-footer">
    <p>© {{ 'now' | date: '%Y' }} {{ site.title }}</p>
    <div class="translate-wrap">
      <div id="google_translate_element"></div>
    </div>
  </footer>

  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
